<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions - Apache Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .server-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .logo {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .status {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔥</div>
        <h1>Web Solutions Ltda</h1>
        <div class="server-info">
            <h2>Apache HTTPD Server</h2>
            <p><strong>Servidor:</strong> Apache HTTPD (Customizado)</p>
            <p><strong>Porta Externa:</strong> 8081</p>
            <p><strong>Status:</strong> <span class="status">✅ Online</span></p>
            <p><strong>Localização:</strong> Taboão da Serra, SP</p>
        </div>
        <p>Solução de containers orquestrada com Kubernetes</p>
        <small>Prova de Conceito - Modernização da Infraestrutura</small>
    </div>
</body>
</html>
