apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment
  namespace: web-solutions
  labels:
    app: apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
        - name: apache
          image: httpd:2.4.57-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: apache-content
              mountPath: /usr/local/apache2/htdocs
      volumes:
        - name: apache-content
          configMap:
            name: apache-index
